crawl:
  user_agent: tgb-market-v-skill-pipeline/0.1
  request_interval_seconds: 2.0
  request_timeout_seconds: 20
  max_retries: 3
  max_index_pages: 100
  concurrency: 1
  respect_robots_txt: true
  resume: true
  allow_seed_article_fallback: true
  seed_only_when_index_missing_start: true
  max_comment_pages_per_article: 100

storage:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  jsonl_encoding: utf-8

comment_completion:
  default_pages_per_article: 100
  max_total_pages_per_run: 300
  priority_article_ids:
    - "1VvuASpPpMr"
    - "1Zn2UmelLMJ"
    - "21mulzOf8Yb"
    - "28ACjvWeEjl"
    - "2bWeZGDSi07"
    - "2fQt29pQ3Pa"
    - "2jbi0efIsof"
    - "2ohHCnLXtP8"
  skip_completed: true
  skip_active_errors: false
